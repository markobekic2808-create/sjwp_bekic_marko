<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zadatak2</title>
    <style>
body {
    font-family: Arial, sans-serif;
    margin: 0;
    padding: 20px;
    background: white;
}

.grid-container {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 15px;

        
}


.item {
    padding: 40px;
    color: white;
    text-align: center;
    font-weight: bold;
    border-radius: 10px;
}


.item1 { background: blue; }
.item2 { background: red; }
.item3 { background:  black; }
.item4 { background: pink; }
.item5 { background: green; }





@media(min-width:1024px){
    .grid-container{
          grid-template-columns: repeat(5, 1fr);
    }
    .item1{
        grid-column: span 5;
    }
    .item2{
        grid-column: span 1;
        grid-row: span 20;
    }
    .item3{
        grid-column: span 4;
        grid-row: span 20;
    }
    .item4{
        grid-column: span 5;
    }
}

@media (max-width: 768px) {
    .grid-container {
        grid-template-columns: 1fr;
    }

    .item1{
        grid-row: span 1;
    }
    .item2{
        grid-row: span 20;
    }
    .item3{
        grid-row: span 40;
    }
    .item4{
        grid-row: span 1;
    }
}
    </style>
</head>
<body>
    <div class="grid-container">
    <div class="item item1">HEADER</div>
    <div class="item item2">SIDEBAR</div>
    <div class="item item3">MAIN</div>
    <div class="item item4">FOOTER</div>
    
    
  
</div>
</body>
</html>
