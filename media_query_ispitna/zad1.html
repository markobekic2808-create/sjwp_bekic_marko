<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zadatak1</title>
    <style>
body {
    font-family: Arial, sans-serif;
    margin: 0;
    padding: 20px;
    background: white;
}

.grid-container {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 15px;
}


.item {
    padding: 40px;
    color: white;
    text-align: center;
    font-weight: bold;
    border-radius: 10px;
}


.item1 { background: blue; }
.item2 { background: red; }
.item3 { background:  black; }
.item4 { background: pink; }
.item5 { background: green; }
.item6 { background: darksalmon; }
.item7 {background: lightblue; }
.item8 { background: aqua;}


@media (max-width: 1024px) {
    .grid-container {
        grid-template-columns: repeat(2, 1fr);
    }
}


@media (max-width: 768px) {
    .grid-container {
        grid-template-columns: 1fr;
    }
}
    </style>
</head>
<body>
    <div class="grid-container">
    <div class="item item1">Proizvod 1</div>
    <div class="item item2">Proizvod 2</div>
    <div class="item item3">Proizvod 3</div>
    <div class="item item4">Proizvod 4</div>
    <div class="item item5">Proizvod 5</div>
    <div class="item item6">Proizvod 6</div>
    <div class="item item7">Proizvod 7</div>
    <div class="item item8">Proizvod 8</div>
</div>
</body>
</html>
