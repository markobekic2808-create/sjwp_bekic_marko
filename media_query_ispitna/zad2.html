<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zadatak3</title>
    <style>
body {
    font-family: Arial, sans-serif;
    margin: 0;
    padding: 20px;
    background: white;
}

.grid-container {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 15px;
}


.item {
    padding: 40px;
    color: white;
    text-align: center;
    font-weight: bold;
    border-radius: 10px;
}


.item1 { background: blue; }
.item2 { background: red; }
.item3 { background:  black; }
.item4 { background: pink; }
.item5 { background: green; }
.item6 { background: darksalmon; }
.item7 {background: lightblue; }
.item8 { background: aqua;}
.item9{background: saddlebrown;}
.item10{background: aquamarine;}
.item11{background: salmon;}
.item12{background: gold;}


@media (max-width: 1024px) {
    .grid-container {
        grid-template-columns: repeat(2, 1fr);
    }
}


@media (max-width: 768px) {
    .grid-container {
        grid-template-columns: 1fr;
    }
}
    </style>
</head>
<body>
    <div class="grid-container">
    <div class="item item1"></div>
    <div class="item item2"></div>
    <div class="item item3"></div>
    <div class="item item4"></div>
    <div class="item item5"></div>
    <div class="item item6"></div>
    <div class="item item7"></div>
    <div class="item item8"></div>
    <div class="item item9"></div>
    <div class="item item10"></div>
    <div class="item item11"></div>
    <div class="item item12"></div>
</div>
</body>
</html>
