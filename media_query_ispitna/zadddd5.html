<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zadatak5</title>
    <style>
body {
    font-family: Arial, sans-serif;
    margin: 0;
    padding: 20px;
    background: white;
}

.grid-container {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 15px;

    
}


.item {
    padding: 40px;
    color: white;
    text-align: center;
    font-weight: bold;
    border-radius: 10px;
}


.item1 { background: blue; }
.item2 { background: red; }
.item3 { background:  black; }
.item4 { background: pink; }
.item5 { background: green; }
.item6{background: khaki;}




@media(min-width:1024px){
    .grid-container {
        grid-template-columns: repeat(4,1fr);
    }

    .item1{
        grid-column: span 3;
    }
}


@media (max-width: 768px) {
    .grid-container {
        grid-template-columns: 1fr;
    }

    .item1{
        grid-row: span 10;
    }
}
    </style>
</head>
<body>
    <div class="grid-container">
    <div class="item item1"></div>
    <div class="item item2"></div>
    <div class="item item3"></div>
    <div class="item item4"></div>
    <div class="item item5"></div>
    <div class="item item6"></div>
    
  
</div>
</body>
</html>
